# Calibration motion defaults.
# 
# During calibration, the arm will move incrementally, and the operator
# will confirm each safe position before recording. These settings are used
# to control the speed and size of the steps.

# Profile velocity to use in rpm.
profile_velocity_rpm: 23 

# Used for Trapezoidal velocity-based profile: max acceleration in rev/min^2 (omit for rectangular profile).
profile_acceleration_rpm2: 1000

# Small step size to use in degrees.
step_small_deg: 5 # ~56 units in encoder ticks 

# Large step size to use in degrees.
step_large_deg: 10 # ~112 units in encoder ticks 

# X-large step size to use in degrees.
step_xlarge_deg: 30 # ~336 units in encoder ticks 

# Encoder tolerance to use when validating recorded positions in ticks.
validation_tolerance_ticks: 15

# Brief pause between validation waypoint moves (seconds).
validation_hold_s: 0.3

# Supporting joints to position before validating a given joint (fraction along limits).
validation_prep:
  r_elb_flex:
    - joint: r_sh_rot
      fraction: 1.0
