# Home-relative motion patterns for the testing of the HARPER arm.
#
# Each joint value is a fraction in [-1, 1] from calibrated home:
#   0  = home_position in config/arm.yaml
#   1  = semantic max in position_limits
#  -1  = semantic min in position_limits
#
# Keyframes are confirmed steps in a motion pattern.  Each keyframe is one
# move command:
#
#   - Every joint listed in a keyframe's fractions moves at the same time on a
#     synchronized S-curve and finishes together.
#   - Joints omitted from fractions are not commanded and hold their current
#     position.
#   - To move joints one after another, use separate keyframes (one motion per
#     keyframe).
#
# Profile_Velocity in RPM to use for the motion.
default_profile_velocity_rpm: 23
#
# Trapezoidal ramp in rev/min^2 (Profile_Acceleration register; both velocity and
# acceleration must be non-zero for trapezoidal position-mode profiles).
default_profile_acceleration_rpm2: 1000
#
# S-curve motion.
#
# E2E moves stream many intermediate Goal Position commands along a smooth
# S-curve instead of jumping straight to the final pose. These limits shape
# that planned path. All joints in a keyframe share one duration so they finish
# together. Lower values = slower, gentler motion; higher values = faster but
# rougher and more likely to overshoot or trip safety limits.
#
# Peak joint speed during the S-curve, in deg/s.
default_scurve_max_velocity_deg_s: 138 # ~23rpm @ 4096 ticks/rev
# Peak rate of change of speed, in deg/s^2. Controls how
# quickly the arm ramps up and down (jerk is still bounded by the S-curve shape).
default_scurve_max_acceleration_deg_s2: 40 # ~66rpm^2 @ 4096 ticks/rev
# Seconds between streamed position setpoints. Smaller = smoother tracking and
# more bus traffic; larger = coarser steps (may look stair-stepped on fast moves).
default_scurve_sample_period_s: 0.1

# Seconds to hold each keyframe after the move completes before the next step.
default_hold_s: 5.0

tests:
  reach_sideways:
    label: Reach sideways
    keyframes:
      - name: open shoulder
        fractions:
          r_sh_abd: 0.8
          r_sh_rot: 0.5
      - name: return near home
        fractions:
          r_sh_abd: 0
          r_sh_rot: 0

  reach_overhead:
    label: Reach overhead
    keyframes:
      - name: lift shoulder
        fractions:
          r_sh_flex: 0.8
          r_sh_abd: 0.5
          r_sh_rot: 0.5
      - name: return near home
        fractions:
          r_sh_flex: 0
          r_sh_abd: 0
          r_sh_rot: 0

  arm_wave:
    label: Arm wave
    keyframes:
      - name: wave up
        fractions:
          r_sh_flex: 1
          r_sh_rot: 0.5
          r_sh_abd: 0.3
      - name: wave back
        fractions:
          r_sh_abd: 0.1
      - name: wave forward
        fractions:
          r_sh_abd: 0.5
      - name: wave back
        fractions:
          r_sh_abd: 0.1
      - name: wave forward
        fractions:
          r_sh_abd: 0.5
      - name: wave back
        fractions:
          r_sh_abd: 0.1
      - name: wave forward
        fractions:
          r_sh_abd: 0.5
      - name: return near home
        fractions:
          r_sh_flex: 0
          r_sh_rot: 0
          r_sh_abd: 0

  wrist_flexion_sweep:
    label: Wrist flexion sweep
    keyframes:
      - name: wrist flex
        fractions:
          r_wrist_flex: 1
      - name: wrist extend
        fractions:
          r_wrist_flex: -1
      - name: wrist home
        fractions:
          r_wrist_flex: 0

  forearm_rotation_sweep:
    label: Forearm rotation sweep
    keyframes:
      - name: pronate
        fractions:
          r_farm_rot: 1
      - name: supinate
        fractions:
          r_farm_rot: -1
      - name: forearm home
        fractions:
          r_farm_rot: 0

  shoulder_rotation_sweep:
    label: Shoulder rotation sweep
    keyframes:
      - name: rotate out
        fractions:
          r_sh_rot: 1
      - name: rotate in
        fractions:
          r_sh_rot: -1
      - name: shoulder rotation home
        fractions:
          r_sh_rot: 0

  combined_wrist_forearm_rotation:
    label: Combined wrist + forearm rotation
    keyframes:
      - name: rotate together max
        fractions:
          r_farm_rot: 1
          r_wrist_flex: 1
      - name: rotate together min
        fractions:
          r_farm_rot: -1
          r_wrist_flex: -1
      - name: return near home
        fractions:
          r_farm_rot: 0
          r_wrist_flex: 0

  combined_opposite_shoulder_elbow_flexion:
    label: Combined opposite shoulder + elbow flexion
    keyframes:
      - name: shoulder rot max
        fractions:
          r_sh_rot: 1
      - name: flex elbow
        fractions:
          r_elb_flex: 0.8
      - name: flex shoulder and extend elbow
        fractions:
          r_sh_flex: 0.8
          r_elb_flex: -0.8
      - name: return near home
        fractions:
          r_sh_rot: 0
          r_sh_flex: 0
          r_elb_flex: 0
