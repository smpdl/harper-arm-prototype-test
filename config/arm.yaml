# Note (units):

# Position limits are raw encoder ticks (1 tick = 1 pulse).
# X-series resolution is 4096 ticks/rev (0 ~ 4095 in single-turn position mode).
#
# Extended / multi-turn joints may use ticks outside 0..4095; same formula applies.

# Current limits are Goal Current register units (not mA).
# XM540, XM430: 1 unit = 2.69 mA  (e.g. 5.5 A -> 5500 / 2.69 ~= 2045)
# XL430, XC330: 1 unit = 1.0 mA   (e.g. 1.4 A -> 1400)

# Note (current limits):

# Values are datasheet max stall current, converted to register units
# (see conversion notes above). This may differ from the factory EEPROM default
# for Current Limit(38) (e.g. XM430 default 1193 vs 1004 for 2.7 A).

# Direction of the joint in arm.yaml decides whether a positive offset increases
# or decreases encoder ticks. For example, with home_position = 2048 and
# direction = 1, +90deg -> tick 3072; with direction = -1, +90deg -> tick 1024.

# Home position is the position of the joint when it is at its home position.
# calibrated must be true (set automatically when saving from the TUI) before
# motion tests will run.

serial:
  port: "/dev/ttyUSB0"
  baud_rate: 115200

joints:
  r_sh_flex:
    id: 1
    model: xm540-w270-t
    protocol: 2
    position_limits: [0, 4095]
    home_position: null
    calibrated: false
    direction: 1
    position_profile_acceleration_rpm2: 1000
    current_limit: 2045
  r_sh_abd:
    id: 2
    model: xm540-w270-t
    protocol: 2
    position_limits: [1500, 3200]
    home_position: null
    calibrated: false
    direction: 1
    position_profile_acceleration_rpm2: 1000
    current_limit: 2045
  r_sh_rot:
    id: 3
    model: xm430-w350-t
    protocol: 2
    position_limits: [1500, 4500]
    home_position: null
    calibrated: false
    direction: 1
    position_profile_acceleration_rpm2: 1000
    current_limit: 1004
  r_elb_flex:
    id: 4
    model: xl430-w250-t
    protocol: 2
    position_limits: [-15500, 5500]
    home_position: null
    calibrated: false
    direction: 1
    position_profile_acceleration_rpm2: 1000
    current_limit: 1400
  r_farm_rot:
    id: 5
    model: xl430-w250-t
    protocol: 2
    position_limits: [0, 4095]
    home_position: null
    calibrated: false
    direction: 1
    position_profile_acceleration_rpm2: 1000
    current_limit: 1400
  r_wrist_flex:
    id: 6
    model: xl430-w250-t
    protocol: 2
    position_limits: [3200, 4800]
    home_position: null
    calibrated: false
    direction: 1
    position_profile_acceleration_rpm2: 1000
    current_limit: 1400
